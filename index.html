<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shri Baba Chhotu Nath Temple (Badesra, Bhiwani) - A sacred spiritual center dedicated to devotion, service, and the teachings of Baba Chhotu Nath Sarkar." />
    <meta name="keywords" content="babachhotunathsarkar, babachhotunathsarkarsewasamiti, temple, hindu temple, bhiwnai distric temple, badesra temple, baba chhotunath temple, baba temple" />
    <meta name="author" content="Shri Baba Chhotu Nath Sewa Samiti" />
    <title>Shri Baba Chhotu Nath Temple | Official Website</title>
    <style>
      /* Aggressively hide Google Translate UI but keep translation logic */
      .goog-te-banner-frame, 
      .goog-te-banner,
      .goog-te-menu-value span,
      .goog-te-gadget-icon,
      .goog-te-gadget-simple img,
      .goog-te-menu-frame,
      #google_translate_element,
      .skiptranslate,
      .goog-tooltip,
      .goog-te-balloon-frame {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
      body {
        top: 0px !important;
      }
      .goog-text-highlight {
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      // ── Language Default Script ──────────────────────────────────────────
      // Honor the 'Default Hindi' requirement by setting the googtrans cookie
      // to '/en/hi' if no language preference is already set.
      (function() {
        const langCookie = document.cookie.split('; ').find(row => row.startsWith('googtrans='));
        if (!langCookie) {
          // Set cookie for Hindi by default
          document.cookie = 'googtrans=/en/hi; path=/';
          // Reload to apply the translation on the first visit
          window.location.reload();
        }
      })();

      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'hi,en,pa', // Only include the strictly required languages
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
          },
          'google_translate_element'
        );
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.jsx"></script>
    <div id="google_translate_element" style="display:none"></div>
  </body>
</html>
